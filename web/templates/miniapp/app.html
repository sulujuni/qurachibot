    <nav class="navbar">
        <button class="nav-btn active" data-tab="home" onclick="switchTab('home')">

        <button class="nav-btn" data-tab="profile" onclick="switchTab('profile')">

        </button>
    </nav>
</div>

<style>
:root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --bg-secondary: var(--tg-theme-secondary-bg-color, #f4f4f5);
    --text: var(--tg-theme-text-color, #1a1a2e);
    --text-hint: var(--tg-theme-hint-color, #999);
    --link: var(--tg-theme-link-color, #2481cc);
    --btn: var(--tg-theme-button-color, #7c4dff);
    --btn-text: var(--tg-theme-button-text-color, #fff);
    --border: rgba(0,0,0,0.06);
    --card-shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 16px;
    --radius-sm: 10px;
    --nav-height: 64px;
    --topbar-height: 52px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-secondary);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
}
.topbar {
    position: fixed; top:0; left:0; right:0; z-index:100;
    height: var(--topbar-height);
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
}
.topbar-title { font-weight: 800; font-size: 18px; }
</style>


<style>
.content {
    padding: calc(var(--topbar-height) + 12px) 16px calc(var(--nav-height) + 16px);
    max-width: 480px; margin: 0 auto;
}
.navbar {
    position: fixed; bottom:0; left:0; right:0; z-index:100;
    height: var(--nav-height);
    background: var(--bg);
    display: flex; align-items: center; justify-content: space-around;
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-btn {
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 6px 12px; border-radius: 12px; transition: all 0.2s;
    color: var(--text-hint);
}
.nav-btn.active { color: var(--btn); }
.nav-icon { font-size: 22px; }
.nav-label { font-size: 11px; font-weight: 600; }
.card {
    background: var(--bg); border-radius: var(--radius);
    padding: 18px; margin-bottom: 12px;
    box-shadow: var(--card-shadow);
}
.card-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
.stat-box { background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
.stat-val { font-size: 24px; font-weight: 800; color: var(--btn); }
.stat-lbl { font-size: 11px; color: var(--text-hint); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
</style>


<style>
.game-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
}
.game-item:last-child { border-bottom: none; }
.game-icon { font-size: 28px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
    background: var(--bg-secondary); border-radius: 12px; }
.game-info { flex: 1; }
.game-title { font-weight: 600; font-size: 14px; }
.game-meta { font-size: 12px; color: var(--text-hint); margin-top: 2px; }
.game-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
.badge-active { background: #e8f5e9; color: #2e7d32; }
.badge-ended { background: #fce4ec; color: #c62828; }
.badge-won { background: #fff3e0; color: #e65100; }
.lb-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.lb-item:last-child { border-bottom: none; }
.lb-rank { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; border-radius: 50%; background: var(--bg-secondary); }
.lb-rank.gold { background: #fff8e1; color: #f57f17; }
.lb-rank.silver { background: #eceff1; color: #546e7a; }
.lb-rank.bronze { background: #fbe9e7; color: #bf360c; }
.lb-name { flex: 1; font-weight: 500; font-size: 14px; }
.lb-pts { font-weight: 700; color: var(--btn); font-size: 14px; }
</style>


<style>
.form-group { margin-bottom: 16px; }
.form-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: block; color: var(--text); }
.form-input, .form-select, .form-textarea {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 15px; background: var(--bg);
    color: var(--text); font-family: inherit; transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none; border-color: var(--btn);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-hint { font-size: 12px; color: var(--text-hint); margin-top: 4px; }
.btn {
    display: block; width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm);
    font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    text-align: center;
}
.btn-primary { background: var(--btn); color: var(--btn-text); }
.btn-primary:active { opacity: 0.85; transform: scale(0.98); }
.btn-secondary { background: var(--bg-secondary); color: var(--text); margin-top: 8px; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-hint); }
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.5; }
.chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.chip { padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
    background: var(--bg-secondary); border: 1.5px solid var(--border); cursor: pointer; transition: all 0.2s; }
.chip.selected { background: var(--btn); color: var(--btn-text); border-color: var(--btn); }
.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
    z-index: 999; animation: fadeIn 0.3s; }
.toast-success { background: #4caf50; color: white; }
.toast-error { background: #f44336; color: white; }
@keyframes fadeIn { from { opacity:0; transform: translateX(-50%) translateY(-10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
</style>

function t(key) { return (T[currentLang] || T['uz'])[key] || (T['uz'])[key] || key; }

async function api(path, method='GET', body=null) {
    const opts = { method, headers };
    if (body) opts.body = JSON.stringify(body);
    try {
        const r = await fetch(`${BASE}/miniapp/api${path}`, opts);
        if (!r.ok && r.status === 401) {
            console.warn('API 401 — initData may be invalid. Path:', path);
            return {};
        }
        const data = await r.json();
        return data;
    } catch(e) {
        console.error('API error:', path, e);
        return {};
    }
}

async function initApp() {
    try {
        userData = await api('/me');
        isAdmin = userData.is_admin;
    } catch(e) {
        isAdmin = false;
    }

    // Load user's language preference
    try {
        const langData = await api('/language');
        if (langData.language) currentLang = langData.language;
    } catch(e) {}

    // Update nav labels to match language
    updateNavLabels();

    // Show admin tab if user is admin
    if (isAdmin) {
        const navbar = document.querySelector('.navbar');
        const adminBtn = document.createElement('button');
        adminBtn.className = 'nav-btn';
        adminBtn.dataset.tab = 'admin';
        adminBtn.onclick = () => switchTab('admin');
        adminBtn.innerHTML = `<span class="nav-icon">⚙️</span><span class="nav-label">${t('admin')}</span>`;
        navbar.appendChild(adminBtn);
    }

    // Load initial tab
    const initTab = new URLSearchParams(window.location.search).get('tab') || 'home';
    switchTab(initTab);
}

function updateNavLabels() {
    const labels = {home: t('home'), games: t('games'), leaders: t('leaders'), create: t('create'), profile: t('profile')};
    document.querySelectorAll('.nav-btn').forEach(btn => {
        const tab = btn.dataset.tab;
        if (labels[tab]) {
            btn.querySelector('.nav-label').textContent = labels[tab];
        }
    });
}

let currentTab = 'home';
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    const loaders = { home: renderHome, games: renderGames, leaders: renderLeaders, create: renderCreate, admin: renderAdmin, profile: renderProfile };
    if (loaders[tab]) loaders[tab]();
}

function showToast(msg, type='success') {
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

function timeAgo(iso) {
    if (!iso) return '';
    const d = (Date.now() - new Date(iso).getTime()) / 1000;
    if (d < 60) return 'hozirgina';
    if (d < 3600) return Math.floor(d/60) + ' min oldin';
    if (d < 86400) return Math.floor(d/3600) + ' soat oldin';
    return Math.floor(d/86400) + ' kun oldin';
}

function timeLeft(iso) {
    if (!iso) return t('no_limit');
    const d = (new Date(iso).getTime() - Date.now()) / 1000;
    if (d <= 0) return t('ended');
    if (d < 3600) return Math.floor(d/60) + ' min ' + t('left');
    if (d < 86400) return Math.floor(d/3600) + ' h ' + t('left');
    return Math.floor(d/86400) + ' d ' + t('left');
}

        html += `<div class="empty-state"><p>${t('no_created')}</p></div>`;

}

    let deadline = null;
    if (durVal === 'custom') {
        deadline = document.getElementById('cDeadline').value;
        if (!deadline) { showToast("Tugash vaqtini kiriting!", 'error'); return; }
        duration = null;
    }

    const body = {
        title, prize,
        description: document.getElementById('cDesc').value.trim() || null,
        winner_count: parseInt(document.getElementById('cWinners').value) || 1,
        duration: duration,
        deadline: deadline,
        required_channels: document.getElementById('cChannels').value.trim() || null,
    };
    const res = await api('/create-giveaway', 'POST', body);
    if (res.error) { showToast(res.error, 'error'); return; }
    showToast("✅ Yutuqli o'yin yaratildi! ID: " + res.id);
    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    switchTab('home');
}

async function submitCommentGiveaway() {
    const title = document.getElementById('cTitle').value.trim();
    const prize = document.getElementById('cPrize').value.trim();
    if (!title || !prize) { showToast("Nom va sovg'ani kiriting!", 'error'); return; }
    const mode = document.getElementById('cMode').value;

    const durVal = document.getElementById('cDuration').value;
    let duration = durVal;
    let deadline = null;
    if (durVal === 'custom') {
        deadline = document.getElementById('cDeadlineCmt').value;
        if (!deadline) { showToast("Tugash vaqtini kiriting!", 'error'); return; }
        duration = null;
    }

    const body = {
        title, prize,
        description: document.getElementById('cDesc').value.trim() || null,
        winner_count: parseInt(document.getElementById('cWinners').value) || 1,
        duration: duration,
        deadline: deadline,
        mode: mode,
        keyword: mode === 'keyword' ? (document.getElementById('cKeyword').value.trim() || null) : null,
        required_channels: document.getElementById('cChannels').value.trim() || null,
    };
    const res = await api('/create-comment-giveaway', 'POST', body);
    if (res.error) { showToast(res.error, 'error'); return; }
    showToast("✅ Izohli o'yin yaratildi!");
    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    switchTab('home');
}

async function submitContest() {
    const title = document.getElementById('cTitle').value.trim();
    if (!title) { showToast("Konkurs nomini kiriting!", 'error'); return; }
    const body = {
        title,
        prize: document.getElementById('cPrize').value.trim() || null,
        description: document.getElementById('cDesc').value.trim() || null,
        contest_type: document.getElementById('cContestType').value,
        winner_count: parseInt(document.getElementById('cWinners').value) || 1,
        max_submissions: parseInt(document.getElementById('cMaxSubs')?.value) || 1,
    };
    const res = await api('/create-contest', 'POST', body);
    if (res.error) { showToast(res.error, 'error'); return; }
    showToast("✅ Konkurs yaratildi! ID: " + res.id);
    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    switchTab('home');
}

async function sendBroadcast() {
    const text = document.getElementById('bcText').value.trim();
    if (!text) { showToast("Xabar matnini kiriting!", 'error'); return; }
    const target = document.getElementById('bcTarget').value;

    if (!confirm(`Rostdan ham "${target}" ga xabar yubormoqchimisiz?`)) return;

    const res = await api('/admin/broadcast', 'POST', {text, target});
    if (res.error) { showToast(res.error, 'error'); return; }
    showToast(`📢 ${res.sent || 0} ta foydalanuvchiga yuborildi!`);
    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    document.getElementById('bcText').value = '';
}
// ─── Initialize ─────────────────────────────────────────────────
initApp();

// ─── Deadline toggle (show/hide custom date input) ──────────────
document.addEventListener('change', function(e) {
    if (e.target.id === 'cDuration') {
        const box = document.getElementById('gwDeadlineBox') || document.getElementById('cmtDeadlineBox');
        if (box) box.classList.toggle('hidden', e.target.value !== 'custom');
    }
});
</script>


<script>
// ─── ADMIN TAB (only visible to admins) ─────────────────────────
async function renderAdmin() {
    const el = document.getElementById('content');
    el.innerHTML = '<div class="empty-state">⏳</div>';

    const [stats, giveaways] = await Promise.all([
        api('/admin/stats'),
        api('/admin/all-giveaways'),
    ]);

    let html = `
    <div class="card">
        <div class="card-title">⚙️ ${t('admin_panel')}</div>
        <div class="stats-row">
            <div class="stat-box"><div class="stat-val">${stats.giveaways?.total||0}</div><div class="stat-lbl">${t('total_games')}</div></div>
            <div class="stat-box"><div class="stat-val">${stats.giveaways?.active||0}</div><div class="stat-lbl">${t('active')}</div></div>
            <div class="stat-box"><div class="stat-val">${stats.participants?.unique_users||0}</div><div class="stat-lbl">${t('users_label')}</div></div>
            <div class="stat-box"><div class="stat-val">${stats.participants?.winners||0}</div><div class="stat-lbl">${t('winners_label')}</div></div>
        </div>
        <div class="stats-row">
            <div class="stat-box"><div class="stat-val">${stats.referrals?.verified||0}</div><div class="stat-lbl">${t('referrals_label')}</div></div>
            <div class="stat-box"><div class="stat-val">${stats.contests?.total||0}</div><div class="stat-lbl">${t('contests_label')}</div></div>
            <div class="stat-box"><div class="stat-val">${stats.moderation?.blacklisted||0}</div><div class="stat-lbl">${t('blocked_label')}</div></div>
            <div class="stat-box"><div class="stat-val">${stats.points?.total_distributed||0}</div><div class="stat-lbl">${t('total_points_label')}</div></div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📋 ${t('all_games_manage')}</div>`;

    if (!giveaways.length) {
        html += `<div class="empty-state"><p>${t('no_games')}</p></div>`;
    } else {
        giveaways.forEach(g => {
            const statusBadge = g.status === 'active'
                ? `<span class="game-badge badge-active">${t('active')}</span>`
                : `<span class="game-badge badge-ended">${t('ended')}</span>`;

            const actions = g.status === 'active' ? `
                <div style="display:flex;gap:8px;margin-top:8px;">
                    <button class="btn btn-primary" style="padding:8px 12px;font-size:12px;width:auto;flex:1;" onclick="adminDraw(${g.id})">🎲 ${t('draw_btn')}</button>
                    <button class="btn btn-secondary" style="padding:8px 12px;font-size:12px;width:auto;flex:1;margin-top:0;" onclick="adminCancel(${g.id})">❌ ${t('cancel_btn')}</button>
                </div>` : '';

            html += `<div class="game-item" style="flex-direction:column;align-items:stretch;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <div class="game-icon">🎁</div>
                    <div class="game-info">
                        <div class="game-title">${g.title}</div>
                        <div class="game-meta">👤 ${g.participants} · 🏆 ${g.winner_count} · ${g.creator_username ? '@'+g.creator_username : '?'} · ${timeAgo(g.created_at)}</div>
                    </div>
                    ${statusBadge}
                </div>
                ${actions}
            </div>`;
        });
    }
    html += '</div>';

    // User counter
    const usersData = await api('/admin/users-count');
    html += `<div class="card">
        <div class="card-title">👥 ${t('users_title')}</div>
        <div class="stats-row">
            <div class="stat-box"><div class="stat-val">${usersData.total_started||0}</div><div class="stat-lbl">${t('us_started')}</div></div>
            <div class="stat-box"><div class="stat-val">${usersData.total_participants||0}</div><div class="stat-lbl">${t('us_participants')}</div></div>
            <div class="stat-box"><div class="stat-val">${usersData.verified||0}</div><div class="stat-lbl">${t('us_verified')}</div></div>
            <div class="stat-box"><div class="stat-val">${usersData.today_active||0}</div><div class="stat-lbl">${t('us_today')}</div></div>
        </div>
    </div>`;

    // DB Info
    const dbData = await api('/admin/dbinfo');
    html += `<div class="card">
        <div class="card-title">🗄 ${t('dbinfo_title')}</div>
        <div style="font-size:13px;margin-bottom:10px;"><b>${t('db_size')}:</b> ${dbData.db_size || '?'}</div>
        <div style="max-height:200px;overflow-y:auto;">`;
    if (dbData.row_counts) {
        Object.entries(dbData.row_counts).forEach(([table, rows]) => {
            html += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;">
                <span>${table}</span><span style="font-weight:700;">${rows}</span>
            </div>`;
        });
    }
    html += `</div></div>`;

    // Feedback viewer (admin)
    const feedbackData = await api('/admin/feedback');
    html += `<div class="card">
        <div class="card-title">📝 ${t('feedback_title')}</div>`;
    if (feedbackData.length) {
        feedbackData.slice(0, 20).forEach(fb => {
            const typeIcon = {suggestion:'💡', complaint:'😤', bug:'🐛'}[fb.type] || '📝';
            html += `<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;">
                <div style="display:flex;justify-content:space-between;">
                    <span>${typeIcon} <b>${fb.type}</b></span>
                    <span style="color:var(--text-hint);">${fb.date ? new Date(fb.date).toLocaleDateString() : ''}</span>
                </div>
                <div style="margin-top:4px;color:var(--text);">${(fb.text||'').substring(0, 200)}</div>
            </div>`;
        });
    } else {
        html += `<p style="font-size:12px;color:var(--text-hint);">Hali fikrlar yo'q</p>`;
    }
    html += `</div>`;

    el.innerHTML = html;
}

async function adminDraw(id) {
    if (!confirm(t('draw_confirm'))) return;
    const res = await api(`/admin/draw/${id}`, 'POST');
    if (res.error) { showToast(res.error, 'error'); return; }
    showToast(`🎉 ${res.winners.join(', ')}`);
    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    renderAdmin();
}

async function adminCancel(id) {
    if (!confirm(t('cancel_confirm'))) return;
    const res = await api(`/admin/cancel/${id}`, 'POST');
    if (res.error) { showToast(res.error, 'error'); return; }
    showToast("✅ " + t('cancel_btn'));
    renderAdmin();
}
</script>


<script>
// ─── PROFILE TAB ───────────────────────────────────────────────
async function renderProfile() {
    const el = document.getElementById('content');
    el.innerHTML = '<div class="empty-state">⏳</div>';

    let points = {points:0, total_earned:0, config:{}, transactions:[]};
    let referral = {link:'', count:0, points_earned:0, points_per_referral:20};
    let alerts = {subscribed: false};
    let lang = {language: 'uz'};

    try {
        [points, referral, alerts, lang] = await Promise.all([
            api('/points'), api('/referral'), api('/alerts'), api('/language'),
        ]);
    } catch(e) { console.error('Profile load error:', e); }

    // Sync global language with what the server returned
    if (lang.language) currentLang = lang.language;

    let html = '';

    // Language selector (FIRST — most requested)
    const langNames = {uz: "🇺🇿 O'zbekcha", ru: '🇷🇺 Русский', en: '🇬🇧 English'};
    html += `<div class="card">
        <div class="card-title">🌐 ${t('lang_title')}</div>
        <p style="font-size:12px;color:var(--text-hint);margin-bottom:10px;">${t('lang_desc')}</p>
        <div class="chip-row" id="langChips">
            ${Object.entries(langNames).map(([code, name]) =>
                `<span class="chip ${currentLang===code?'selected':''}" id="lang_${code}" onclick="changeLang('${code}')">${name}</span>`
            ).join('')}
        </div>
        <p id="langStatus" style="font-size:12px;color:var(--text-hint);margin-top:6px;">${t('current_lang')}: ${langNames[currentLang]}</p>
    </div>`;

    // Referral card
    html += `<div class="card">
        <div class="card-title">👥 ${t('referral_title')}</div>
        <p style="font-size:13px;color:var(--text-hint);margin-bottom:12px;">
            ${t('referral_desc')} <b>+${referral.points_per_referral} ${t('pts')}</b>
        </p>
        <div class="form-group">
            <input class="form-input" id="refLink" value="${referral.link || '...'}" readonly style="font-size:12px;cursor:pointer;" onclick="copyRefLink()">
            <div class="form-hint">👆 ${t('copy_hint')}</div>
        </div>
        <div class="stats-row">
            <div class="stat-box"><div class="stat-val">${referral.count || 0}</div><div class="stat-lbl">${t('invites')}</div></div>
            <div class="stat-box"><div class="stat-val">${referral.points_earned || 0}</div><div class="stat-lbl">${t('earned')}</div></div>
        </div>
    </div>`;

    // Points card
    html += `<div class="card">
        <div class="card-title">💰 ${t('points_title')}</div>
        <div class="stats-row">
            <div class="stat-box"><div class="stat-val">${points.points || 0}</div><div class="stat-lbl">${t('current_points')}</div></div>
            <div class="stat-box"><div class="stat-val">${points.total_earned || 0}</div><div class="stat-lbl">${t('total')}</div></div>
        </div>
        <div style="margin-top:10px;padding:10px;background:var(--bg-secondary);border-radius:var(--radius-sm);font-size:12px;">
            <b>${t('how_earn')}</b><br>
            🎮 ${t('join_game')}: +${points.config?.join_giveaway || 5}<br>
            🏆 ${t('win')}: +${points.config?.win_giveaway || 50}<br>
            👥 ${t('invite_friend')}: +${points.config?.referral || 20}<br>
            🗳 ${t('vote_action')}: +${points.config?.vote || 2}
        </div>`;
    if (points.transactions?.length) {
        html += `<div style="margin-top:12px;"><b style="font-size:12px;">${t('recent_actions')}:</b></div>
        <div style="margin-top:6px;max-height:180px;overflow-y:auto;">`;
        const reasonLabels = {join_giveaway:"🎮 " + t('join_game'), win_giveaway:"🏆 " + t('win'), referral:"👥 " + t('invite_friend'), vote:"🗳 " + t('vote_action'), submit_entry:"📤"};
        points.transactions.slice(0,10).forEach(tx => {
            const sign = tx.amount > 0 ? '+' : '';
            const color = tx.amount > 0 ? '#4caf50' : '#f44336';
            const label = reasonLabels[tx.reason] || tx.reason;
            html += `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
                <span>${label}</span>
                <span style="color:${color};font-weight:700;">${sign}${tx.amount}</span>
            </div>`;
        });
        html += `</div>`;
    }
    html += `</div>`;

    // Alerts toggle
    const alertActive = alerts.subscribed;
    html += `<div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;">
            <div>
                <div class="card-title" style="margin-bottom:0;">🔔 ${t('alerts_title')}</div>
                <p style="font-size:11px;color:var(--text-hint);margin-top:4px;">${t('alerts_desc')}</p>
            </div>
            <button class="chip ${alertActive ? 'selected' : ''}" onclick="toggleAlerts(this)" id="alertBtn">
                ${alertActive ? '✅ ' + t('alerts_on') : '⭕ ' + t('alerts_off')}
            </button>
        </div>
    </div>`;

    // Feedback / Suggestions & Complaints (for ALL users)
    html += `<div class="card">
        <div class="card-title">📝 ${t('feedback_title')}</div>
        <p style="font-size:12px;color:var(--text-hint);margin-bottom:10px;">${t('feedback_desc')}</p>
        <div class="chip-row" id="fbTypeChips">
            <span class="chip selected" id="fb_suggestion" onclick="setFbType('suggestion')">${t('fb_suggestion')}</span>
            <span class="chip" id="fb_complaint" onclick="setFbType('complaint')">${t('fb_complaint')}</span>
            <span class="chip" id="fb_bug" onclick="setFbType('bug')">${t('fb_bug')}</span>
        </div>
        <div class="form-group">
            <textarea class="form-textarea" id="fbText" placeholder="${t('fb_placeholder')}" style="min-height:70px;"></textarea>
        </div>
        <button class="btn btn-primary" onclick="submitFeedback()">${t('fb_send')}</button>
    </div>`;

    // Join filters — available to ALL users (any channel admin can configure)
    {
        let filters = [];
        try { filters = await api('/join-filters'); } catch(e) {}
        html += `<div class="card">
            <div class="card-title">🚪 ${t('join_filter_title')}</div>
            <p style="font-size:12px;color:var(--text-hint);margin-bottom:12px;">${t('join_filter_desc')}</p>`;

        if (filters.length) {
            filters.forEach(f => {
                html += `<div class="game-item">
                    <div class="game-icon">${f.enabled ? '✅' : '⏸'}</div>
                    <div class="game-info">
                        <div class="game-title">${f.chat_title || 'Chat #' + f.chat_id}</div>
                        <div class="game-meta">${filterModeLabel(f.mode)}</div>
                        <div class="game-meta">✅ ${f.accepted} | ❌ ${f.rejected}</div>
                    </div>
                    <button class="chip" onclick="changeFilterMode('${f.chat_id}')" style="font-size:11px;">⚙️</button>
                </div>`;
            });
        }

        // Add new filter form
        html += `
            <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);">
                <b style="font-size:13px;">➕ ${t('add_filter')}</b>
                <div class="form-group" style="margin-top:10px;">
                    <label class="form-label">${t('channel_input')}</label>
                    <input class="form-input" id="jfChatId" placeholder="@your_channel / -1001234567890">
                </div>
                <div class="form-group">
                    <label class="form-label">${t('mode')}</label>
                    <select class="form-select" id="jfMode">
                        <option value="all">${filterModeLabel('all')}</option>
                        <option value="no_bots">${filterModeLabel('no_bots')}</option>
                        <option value="females">${filterModeLabel('females')}</option>
                        <option value="males">${filterModeLabel('males')}</option>
                        <option value="subscribed">${filterModeLabel('subscribed')}</option>
                        <option value="started">${filterModeLabel('started')}</option>
                        <option value="off">${filterModeLabel('off')}</option>
                    </select>
                </div>
                <div class="form-group" id="jfChannelsGroup" style="display:none;">
                    <label class="form-label">${t('sub_channels')}</label>
                    <input class="form-input" id="jfChannels" placeholder="@channel1, @channel2">
                </div>
                <button class="btn btn-primary" onclick="addJoinFilter()">💾 ${t('save')}</button>
            </div>`;
        html += `</div>`;

        // Add listener to show channels field when 'subscribed' mode selected
        setTimeout(() => {
            const sel = document.getElementById('jfMode');
            const chGroup = document.getElementById('jfChannelsGroup');
            if (sel && chGroup) {
                sel.onchange = () => { chGroup.style.display = sel.value === 'subscribed' ? 'block' : 'none'; };
            }
        }, 50);
    }

    el.innerHTML = html;
}

function filterModeLabel(mode) {
    const labels = {
        uz: {all:'✅ Hammani qabul qilish', no_bots:'🤖❌ Botlarni rad etish', females:'👩 Faqat ayollar', males:'👨 Faqat erkaklar', subscribed:'📢 Obuna bo\'lganlar', started:'🤖 Botni ishga tushirganlar', off:'⏸ O\'chirish'},
        ru: {all:'✅ Принимать всех', no_bots:'🤖❌ Отклонять ботов', females:'👩 Только девушки', males:'👨 Только парни', subscribed:'📢 Подписчики', started:'🤖 Запустившие бота', off:'⏸ Выключить'},
        en: {all:'✅ Accept everyone', no_bots:'🤖❌ Reject bots', females:'👩 Females only', males:'👨 Males only', subscribed:'📢 Subscribers only', started:'🤖 Bot starters', off:'⏸ Disable'},
    };
    return (labels[currentLang] || labels.uz)[mode] || mode;
}

function copyRefLink() {
    const input = document.getElementById('refLink');
    input.select();
    navigator.clipboard.writeText(input.value).then(() => {
        showToast('📋 ' + t('copied'));
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }).catch(() => {
        document.execCommand('copy');
        showToast('📋 ' + t('copied'));
    });
}

async function toggleAlerts(btn) {
    try {
        const res = await api('/alerts/toggle', 'POST');
        if (btn) {
            btn.className = `chip ${res.subscribed ? 'selected' : ''}`;
            btn.textContent = res.subscribed ? '✅ ' + t('alerts_on') : '⭕ ' + t('alerts_off');
        }
        showToast(res.subscribed ? '🔔 ' + t('alerts_on') : '🔕 ' + t('alerts_off'));
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    } catch(e) { showToast('Error', 'error'); }
}

async function changeLang(newLang) {
    try {
        const res = await api('/language', 'POST', {language: newLang});
        if (res.error) { showToast(res.error, 'error'); return; }

        // ACTUALLY change the Mini App language
        currentLang = newLang;

        // Update navigation labels
        updateNavLabels();

        // Update UI chips immediately
        const langNames = {uz: "🇺🇿 O'zbekcha", ru: '🇷🇺 Русский', en: '🇬🇧 English'};
        document.querySelectorAll('#langChips .chip').forEach(el => {
            el.classList.toggle('selected', el.id === `lang_${newLang}`);
        });
        const statusEl = document.getElementById('langStatus');
        if (statusEl) statusEl.textContent = `${t('current_lang')}: ${langNames[newLang]}`;

        showToast('✅ ' + t('lang_changed') + ': ' + langNames[newLang]);
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

        // Re-render the current tab so all text updates
        setTimeout(() => switchTab(currentTab), 300);
    } catch(e) {
        showToast('Error', 'error');
        console.error('setLang error:', e);
    }
}

async function changeFilterMode(chatId) {
    // Scroll to the add form and pre-fill the chat_id
    const input = document.getElementById('jfChatId');
    if (input) {
        input.value = chatId;
        input.scrollIntoView({behavior: 'smooth'});
        showToast('👇 Rejimni tanlang va saqlang');
    }
}

async function addJoinFilter() {
    const chatId = document.getElementById('jfChatId').value.trim();
    const mode = document.getElementById('jfMode').value;
    const channels = document.getElementById('jfChannels')?.value.trim() || null;

    if (!chatId) { showToast("Kanal ID yoki @username kiriting!", 'error'); return; }

    const res = await api('/join-filter/set', 'POST', {chat_id: chatId, mode, channels});
    if (res.error) { showToast(res.error, 'error'); return; }
    showToast('✅ Filter saqlandi!');
    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    renderProfile();
}

// ─── Feedback functions ─────────────────────────────────────────
let feedbackType = 'suggestion';

function setFbType(type) {
    feedbackType = type;
    document.querySelectorAll('#fbTypeChips .chip').forEach(el => {
        el.classList.toggle('selected', el.id === `fb_${type}`);
    });
}

async function submitFeedback() {
    const text = document.getElementById('fbText').value.trim();
    if (!text) { showToast('❌', 'error'); return; }

    const res = await api('/feedback', 'POST', {text, type: feedbackType});
    if (res.error) { showToast(res.error, 'error'); return; }
    showToast(t('fb_sent'));
    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    document.getElementById('fbText').value = '';
}

async function changeFilterMode(chatId) {
    const modes = ['all', 'no_bots', 'females', 'males', 'subscribed', 'started', 'off'];
    const labels = ['✅ Hammani qabul', '🤖❌ Botlarsiz', '👩 Faqat ayollar', '👨 Faqat erkaklar', '📢 Obuna shart', '🤖 Botni boshlagan', '⏸ O\'chirish'];
    const choice = prompt(`Rejimni tanlang (raqam kiriting):\n${modes.map((m,i) => `${i+1}. ${labels[i]}`).join('\n')}`);
    if (!choice) return;
    const idx = parseInt(choice) - 1;
    if (idx < 0 || idx >= modes.length) { showToast('Noto\'g\'ri raqam', 'error'); return; }

    let channels = null;
    if (modes[idx] === 'subscribed') {
        channels = prompt('Majburiy kanallarni kiriting (masalan: @channel1, @channel2):');
        if (!channels) return;
    }

    const res = await api('/join-filter/set', 'POST', {chat_id: chatId, mode: modes[idx], channels});
    if (res.error) { showToast(res.error, 'error'); return; }
    showToast('✅ Filter o\'zgartirildi!');
    renderProfile(); // refresh
}
</script>

<script>
// ─── CONTEST DETAIL VIEW ───────────────────────────────────────
async function openContest(id) {
    const el = document.getElementById('content');
    el.innerHTML = '<div class="empty-state">⏳</div>';

    const data = await api(`/contest/${id}`);
    if (!data.id) { showToast('?', 'error'); switchTab('home'); return; }

    const statusLabels = {
        accepting_submissions: t('c_st_accepting'),
        voting: t('c_st_voting'),
        completed: t('c_st_completed'),
        cancelled: t('c_st_cancelled'),
    };

    let html = `
    <div class="card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
            <span onclick="switchTab('home')" style="cursor:pointer;font-size:20px;">←</span>
            <div class="card-title" style="margin-bottom:0;">🏅 ${data.title}</div>
        </div>
        ${data.description ? `<p style="font-size:13px;color:var(--text-hint);margin-bottom:12px;">${data.description}</p>` : ''}
        <div class="stats-row">
            <div class="stat-box"><div class="stat-val">${data.submissions.length}</div><div class="stat-lbl">${t('c_submissions')}</div></div>
            <div class="stat-box"><div class="stat-val">${data.winner_count}</div><div class="stat-lbl">${t('c_winners')}</div></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <span class="chip selected">${statusLabels[data.status] || data.status}</span>
            ${data.prize ? `<span class="chip">🎁 ${data.prize}</span>` : ''}
        </div>
    </div>

    <div class="card">
        <div class="card-title">📤 ${t('c_submissions')}</div>`;

    if (!data.submissions.length) {
        html += `<div class="empty-state"><p>${t('c_no_subs')}</p></div>`;
    } else {
        data.submissions.forEach(s => {
            const voteBtn = (!s.is_mine && !s.user_voted && ['accepting_submissions','voting'].includes(data.status))
                ? `<button class="chip" onclick="voteSubmission(${data.id},${s.id})" id="vote_${s.id}">👍 ${t('c_vote')}</button>`
                : s.user_voted ? `<span class="chip selected">✅ ${t('c_voted')}</span>` : '';
            html += `<div class="game-item" style="flex-direction:column;align-items:stretch;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <div class="game-icon">${s.has_photo ? '📷' : '📝'}</div>
                    <div class="game-info">
                        <div class="game-title">${s.user}${s.is_mine ? ' (' + t('you_label') + ')' : ''}</div>
                        <div class="game-meta">${s.text ? s.text.substring(0,80) : '[📷]'} · 👍 ${s.votes}</div>
                    </div>
                </div>
                <div style="margin-top:6px;">${voteBtn}</div>
            </div>`;
        });
    }
    html += '</div>';
    el.innerHTML = html;
}

async function voteSubmission(contestId, submissionId) {
    const res = await api(`/contest/${contestId}/vote/${submissionId}`, 'POST');
    if (res.error) { showToast(res.error, 'error'); return; }
    showToast('👍 ' + t('c_voted'));
    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    openContest(contestId); // refresh
}
</script>
